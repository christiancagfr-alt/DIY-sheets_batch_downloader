name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: write
  attestations: write

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_google.txt
          pip install pyinstaller

      - name: Build Windows exe
        shell: pwsh
        run: |
          python -m PyInstaller `
            --noconfirm `
            --clean `
            --onefile `
            --windowed `
            --name "DIYDownloader" `
            --icon "logo.ico" `
            --add-data "assets;assets" `
            --add-data "logo.png;." `
            "sheets_batch_downloader_modern.py"

          New-Item -ItemType Directory -Force -Path "release" | Out-Null
          Copy-Item "dist/DIYDownloader.exe" "release/DIYDownloader-${{ github.ref_name }}-windows.exe"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: release/DIYDownloader-${{ github.ref_name }}-windows.exe
          if-no-files-found: error

  build-macos:
    name: Build macOS
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_google.txt
          pip install pyinstaller

      - name: Build macOS app
        run: |
          python -m PyInstaller \
            --noconfirm \
            --clean \
            --windowed \
            --name "DIYDownloader" \
            --add-data "assets:assets" \
            --add-data "logo.png:." \
            "sheets_batch_downloader_modern.py"

          mkdir -p release
          ditto -c -k --sequesterRsrc --keepParent "dist/DIYDownloader.app" "release/DIYDownloader-${{ github.ref_name }}-macos.zip"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: release/DIYDownloader-${{ github.ref_name }}-macos.zip
          if-no-files-found: error

  release:
    name: Attest and Release
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-macos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: List release files
        run: ls -la release

      - name: Attest Build Provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'release/*'

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: 'release/*'
          name: 'DIY下载器 ${{ github.ref_name }}'
          body_path: release_notes.md
