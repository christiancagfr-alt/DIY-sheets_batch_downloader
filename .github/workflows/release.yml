name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  id-token: write
  contents: write
  attestations: write

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_google.txt
          pip install pyinstaller

      - name: Read app version
        id: ver
        shell: pwsh
        run: |
          $raw = Get-Content "version.py" -Raw
          if ($raw -match 'APP_VERSION\s*=\s*"([^"]+)"') {
            $v = $Matches[1]
          } else {
            $v = "${{ github.ref_name }}".TrimStart("v")
          }
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "APP_VERSION=$v"

      - name: Build Windows exe
        shell: pwsh
        run: |
          python -m PyInstaller `
            --noconfirm `
            --clean `
            --onefile `
            --windowed `
            --name "DIYDownloader" `
            --icon "logo.ico" `
            --add-data "assets;assets" `
            --add-data "logo.png;." `
            --add-data "logo.ico;." `
            --hidden-import "yt_dlp" `
            --collect-all "yt_dlp" `
            --hidden-import "version" `
            --hidden-import "updater" `
            --hidden-import "env_tools" `
            --hidden-import "video_batch_downloader" `
            "sheets_batch_downloader_modern.py"

          New-Item -ItemType Directory -Force -Path "release" | Out-Null
          $tag = "${{ github.ref_name }}"
          Copy-Item "dist/DIYDownloader.exe" "release/DIYDownloader-$tag-windows.exe"

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          if (-not (Test-Path "C:\Program Files (x86)\Inno Setup 6\ISCC.exe")) {
            throw "ISCC.exe not found"
          }

      - name: Build Windows installer
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $ver = "${{ steps.ver.outputs.version }}"
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          $exe = (Resolve-Path "dist\DIYDownloader.exe").Path
          $outDir = (Resolve-Path ".").Path + "\release"
          New-Item -ItemType Directory -Force -Path $outDir | Out-Null
          # Inno 相对路径以 .iss 所在目录为基准，这里传绝对路径
          & $iscc `
            "/DMyAppVersion=$ver" `
            "/DMyAppSourceExe=$exe" `
            "/O$outDir" `
            "/FDIYDownloader-$tag-windows-setup" `
            "installer\diy_downloader.iss"
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed with $LASTEXITCODE" }
          $setup = Get-ChildItem "release\*setup*.exe" | Select-Object -First 1
          if (-not $setup) { throw "Installer not produced" }
          Get-ChildItem release | Format-Table Name, Length
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: |
            release/DIYDownloader-${{ github.ref_name }}-windows.exe
            release/DIYDownloader-${{ github.ref_name }}-windows-setup.exe
          if-no-files-found: error

  build-macos:
    name: Build macOS
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_google.txt
          pip install pyinstaller

      - name: Build macOS app
        run: |
          python -m PyInstaller \
            --noconfirm \
            --clean \
            --windowed \
            --name "DIYDownloader" \
            --add-data "assets:assets" \
            --add-data "logo.png:." \
            --hidden-import "yt_dlp" \
            --collect-all "yt_dlp" \
            --hidden-import "version" \
            --hidden-import "updater" \
            --hidden-import "env_tools" \
            --hidden-import "video_batch_downloader" \
            "sheets_batch_downloader_modern.py"

          mkdir -p release
          ditto -c -k --sequesterRsrc --keepParent "dist/DIYDownloader.app" "release/DIYDownloader-${{ github.ref_name }}-macos.zip"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: release/DIYDownloader-${{ github.ref_name }}-macos.zip
          if-no-files-found: error

  release:
    name: Attest and Release
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-macos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: List release files
        run: ls -la release

      - name: Attest Build Provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "release/*"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: "release/*"
          name: "DIY下载器 ${{ github.ref_name }}"
          body_path: release_notes.md
          generate_release_notes: true
