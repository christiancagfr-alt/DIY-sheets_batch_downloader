name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: write
  attestations: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Locate app source
        id: app
        shell: pwsh
        run: |
          if (Test-Path "sheets_batch_downloader_modern.py") {
            "dir=." >> $env:GITHUB_OUTPUT
          } elseif (Test-Path "outputs/python-client/sheets_batch_downloader_modern.py") {
            "dir=outputs/python-client" >> $env:GITHUB_OUTPUT
          } else {
            throw "Cannot find sheets_batch_downloader_modern.py"
          }

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r "${{ steps.app.outputs.dir }}/requirements_google.txt"
          pip install pyinstaller

      - name: Build Windows exe
        shell: pwsh
        run: |
          $appDir = "${{ steps.app.outputs.dir }}"
          Push-Location $appDir
          python -m PyInstaller `
            --noconfirm `
            --clean `
            --onefile `
            --windowed `
            --name "DIYDownloader" `
            --icon "logo.ico" `
            --add-data "assets;assets" `
            --add-data "logo.png;." `
            "sheets_batch_downloader_modern.py"
          Pop-Location

          New-Item -ItemType Directory -Force -Path "release" | Out-Null
          Copy-Item "$appDir/dist/DIYDownloader.exe" "release/DIYDownloader-${{ github.ref_name }}-windows.exe"

      - name: Attest Build Provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'release/DIYDownloader-${{ github.ref_name }}-windows.exe'

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: 'release/DIYDownloader-${{ github.ref_name }}-windows.exe'
          generate_release_notes: true
